name: tests

on:
  push:
    branches: [main, "launch-ready-*"]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ml]"

      - name: Smoke-import the public API
        run: |
          python -c "import pmis; assert set(pmis.__all__) >= {'ingest','attach','retrieve','consolidate','delete','remember','ask'}"
          python -m pmis.cli --help

      - name: End-to-end pipeline tests
        run: python pmis_v2/tests/test_e2e.py

      - name: P1/P2 feature validation
        run: python pmis_v2/tests/test_p1_p2.py
        continue-on-error: true   # ChromaDB availability varies by runner
