name: lint

on:
  push:
    branches: [main, "launch-ready-*"]
  pull_request:
    branches: [main]

jobs:
  ruff-black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: pip install ruff black

      - name: ruff (non-blocking — report only for now)
        run: ruff check pmis pmis_v2
        continue-on-error: true

      - name: black --check (non-blocking — report only for now)
        run: black --check pmis pmis_v2
        continue-on-error: true
